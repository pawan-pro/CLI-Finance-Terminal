# Default configuration for the Finance Terminal

display:
  terminal_width: auto
  color_theme: "dark"  # dark, light, custom
  chart_height: 20
  decimal_places: 2

assets:
  watchlist: ["SPY", "QQQ", "AAPL", "TSLA", "BTC-USD"]
  indices: ["^GSPC", "^IXIC", "^DJI", "^VIX"]
  commodities: ["GC=F", "CL=F"]  # Gold, Oil futures

apis:
  preferred_provider: "alpha_vantage"  # fallback order
  rate_limits: true
  timeout: 10
  cache_duration_seconds: 3600 # 1 hour

features:
  show_crypto: true
  show_forex: true
  show_news: true
  max_headlines: 10
